name: tracktoger
description: "A new Flutter project."

publish_to: 'none' # Previene publicación accidental en pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  fl_chart: ^0.69.0
  intl: ^0.20.2
  pdf: ^3.10.7
  path_provider: ^2.1.4
  printing: ^5.13.3
  google_fonts: ^4.0.4
  open_filex: ^4.4.0
  permission_handler: ^11.0.0
  mongo_dart: ^0.10.5
  flutter_dotenv: ^5.1.0
  sendgrid_mailer: ^0.1.3
  cupertino_icons: ^1.0.8
  bcrypt: ^1.1.3
  shared_preferences: ^2.1.1
  image_picker: ^0.8.7+5
  flutter_local_notifications: ^17.2.2
  tflite_flutter: ^0.12.1
  app_links: ^6.1.1
  http: ^0.13.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/models/mantenimiento_predictivo.tflite
    # CSV dataset (descomentar cuando el archivo esté disponible):
    # - assets/datasets/mantenimiento_maquinaria_sintetico.csv

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
